name: Build StickmanFighter (Android)

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  UNITY_VERSION: "2022.3.20f1"
  ANDROID_API_LEVEL: "33"

jobs:
  # PASO 1: Generar archivo de activación (.alf)
  activation:
    name: Request activation file (.alf)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Request activation file
        uses: game-ci/unity-request-activation-file@v2
        with:
          unityVersion: ${{ env.UNITY_VERSION }}

      - name: Upload activation file
        uses: actions/upload-artifact@v4
        with:
          name: Unity_v2022.3.20f1.alf
          path: ./*.alf

  # PASO 2: Compilación (fallará hasta que pongas la licencia, pero nos dará el .alf)
  build-android:
    name: Build Android APK
    needs: activation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Check License
        run: |
          if [[ -z "${{ secrets.UNITY_LICENSE }}" ]]; then
            echo "Esperando licencia..."
            exit 1
          fi
