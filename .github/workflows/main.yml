name: Build StickmanFighter (Android)

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  UNITY_VERSION: "2022.3.20f1"
  ANDROID_API_LEVEL: "33"

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Validate Required Secrets
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:   ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          missing=()
          [[ -z "$UNITY_LICENSE"  ]] && missing+=("UNITY_LICENSE")
          [[ -z "$UNITY_EMAIL"    ]] && missing+=("UNITY_EMAIL")
          [[ -z "$UNITY_PASSWORD" ]] && missing+=("UNITY_PASSWORD")
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Faltan secretos requeridos: ${missing[*]}"
            exit 1
          fi
          echo "Todos los secretos están configurados."

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/Scripts/**', 'Packages/manifest.json', 'ProjectSettings/ProjectSettings.asset') }}
          restore-keys: |
            Library-Android-
            Library-

      - name: Free Disk Space (Ubuntu)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk
          sudo apt-get clean
          df -h

      - name: Run EditMode Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: editmode
          artifactsPath: test-results
        continue-on-error: true

      - name: Build Unity Project (Android APK)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: Android
          buildName: StickmanFighter
          buildsPath: Builds
          buildMethod: BuildScript.BuildAndroid
          androidExportType: androidPackage
          androidKeystoreName: ""
          androidKeystorePass: ""
          androidKeyaliasName: ""
          androidKeyaliasPass: ""
          customParameters: "-buildNumber ${{ github.run_number }} -apk -logFile -"

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: StickmanFighter-Android-APK-${{ github.run_number }}
          path: |
            Builds/Android/*.apk
          retention-days: 14
          if-no-files-found: error

      - name: Build Summary
        if: always()
        run: |
          echo "## Resumen de Construcción" >> $GITHUB_STEP_SUMMARY
          echo "| Ítem | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unity | ${{ env.UNITY_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Plataforma | Android (API ${{ env.ANDROID_API_LEVEL }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Salida | APK (instalación directa) |" >> $GITHUB_STEP_SUMMARY
          echo "| Ejecución | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
